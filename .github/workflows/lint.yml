name: Lint

on:
  pull_request:
    paths:
      - '.github/workflows/lint.yml'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'uno.config.ts'
      - 'justfile'
  push:
    branches: [main, dev]

jobs:
  lint:
    name: Typecheck (vue-tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: extractions/setup-just@v2
        with:
          version: "1.40.0"
      - run: just install
      - run: just lint
