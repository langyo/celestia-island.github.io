name: Deploy Pages

# The site publishes to GitHub Pages (not crates.io/npm), so this is the
# repo's equivalent of the "publish" workflow found in the ecosystem libraries.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install just
        run: |
          curl -sSL https://github.com/casey/just/releases/download/1.55.1/just-1.55.1-x86_64-unknown-linux-musl.tar.gz | tar xz
          sudo install just /usr/local/bin
      - run: just install
      - run: just build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # v5 is the Node 24-native build; @v4 (Node 20) gets forced onto
        # Node 24 by current runners and fails the deployment. Retried once
        # below — deploy-pages intermittently fails with "Deployment failed,
        # try again later" on transient GitHub Pages backend hiccups.
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - name: Retry deployment
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
